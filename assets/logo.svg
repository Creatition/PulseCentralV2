<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Outer gradient ring: blue → purple → hot pink -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1e90ff"/>
      <stop offset="40%"  stop-color="#7b2fff"/>
      <stop offset="100%" stop-color="#ff2f7b"/>
    </linearGradient>
    <!-- Sky background gradient -->
    <radialGradient id="skyGrad" cx="50%" cy="35%" r="65%">
      <stop offset="0%"   stop-color="#0d1435"/>
      <stop offset="100%" stop-color="#060810"/>
    </radialGradient>
    <!-- Pulse line gradient -->
    <linearGradient id="pulseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#1e90ff" stop-opacity="0"/>
      <stop offset="20%"  stop-color="#1e90ff"/>
      <stop offset="50%"  stop-color="#ff2f7b"/>
      <stop offset="80%"  stop-color="#7b2fff"/>
      <stop offset="100%" stop-color="#7b2fff" stop-opacity="0"/>
    </linearGradient>
    <!-- Tree canopy gradient -->
    <linearGradient id="treeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#1fa84e"/>
      <stop offset="100%" stop-color="#0b5c28"/>
    </linearGradient>
    <linearGradient id="treeGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#28c45e"/>
      <stop offset="100%" stop-color="#0f6e30"/>
    </linearGradient>
    <!-- Building gradient -->
    <linearGradient id="bldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#2a2060"/>
      <stop offset="100%" stop-color="#110d30"/>
    </linearGradient>
    <!-- Glow filter for pulse line -->
    <filter id="pulseGlow" x="-20%" y="-150%" width="140%" height="400%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Soft glow for trees -->
    <filter id="treeGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Inner circle clip -->
    <clipPath id="innerClip">
      <circle cx="100" cy="100" r="84"/>
    </clipPath>
    <!-- Window glow -->
    <filter id="winGlow">
      <feGaussianBlur stdDeviation="1" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ═══ OUTER RING ═══ -->
  <circle cx="100" cy="100" r="100" fill="url(#ringGrad)"/>
  <!-- Ring bevel highlight -->
  <circle cx="100" cy="100" r="100" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>

  <!-- ═══ INNER CIRCLE (sky) ═══ -->
  <circle cx="100" cy="100" r="84" fill="url(#skyGrad)"/>

  <!-- ═══ STARS (subtle) ═══ -->
  <g fill="white" opacity="0.5" clip-path="url(#innerClip)">
    <circle cx="55"  cy="35"  r="0.8"/>
    <circle cx="80"  cy="28"  r="0.6"/>
    <circle cx="130" cy="32"  r="0.9"/>
    <circle cx="150" cy="42"  r="0.6"/>
    <circle cx="68"  cy="50"  r="0.5"/>
    <circle cx="145" cy="55"  r="0.7"/>
    <circle cx="40"  cy="60"  r="0.6"/>
    <circle cx="160" cy="68"  r="0.5"/>
  </g>

  <!-- ═══ CITY SKYLINE — LEFT ═══ -->
  <g clip-path="url(#innerClip)">
    <!-- Left skyline buildings -->
    <rect x="18"  y="85"  width="10" height="35" rx="1" fill="url(#bldGrad)"/>
    <rect x="19"  y="78"  width="4"  height="8"  rx="1" fill="url(#bldGrad)"/>
    <rect x="21"  y="74"  width="1.5" height="5" fill="rgba(100,160,255,0.6)"/><!-- antenna -->
    <rect x="29"  y="92"  width="8"  height="28" rx="1" fill="url(#bldGrad)"/>
    <rect x="30"  y="87"  width="2"  height="6"  rx="0.5" fill="url(#bldGrad)"/>
    <rect x="38"  y="96"  width="12" height="24" rx="1" fill="url(#bldGrad)"/>
    <rect x="40"  y="91"  width="8"  height="6"  rx="1" fill="url(#bldGrad)"/>

    <!-- Left building windows -->
    <g fill="rgba(255,220,80,0.55)" filter="url(#winGlow)">
      <rect x="20"  y="88"  width="2" height="1.5"/>
      <rect x="24"  y="88"  width="2" height="1.5"/>
      <rect x="20"  y="93"  width="2" height="1.5"/>
      <rect x="24"  y="93"  width="2" height="1.5"/>
      <rect x="20"  y="98"  width="2" height="1.5"/>
      <rect x="31"  y="95"  width="2" height="1.5"/>
      <rect x="31"  y="101" width="2" height="1.5"/>
      <rect x="31"  y="107" width="2" height="1.5"/>
      <rect x="40"  y="99"  width="2" height="1.5"/>
      <rect x="44"  y="99"  width="2" height="1.5"/>
      <rect x="40"  y="105" width="2" height="1.5"/>
    </g>
    <!-- Blue tinted windows -->
    <g fill="rgba(100,180,255,0.45)">
      <rect x="22"  y="99"  width="2" height="1.5"/>
      <rect x="33"  y="92"  width="2" height="1.5"/>
      <rect x="46"  y="105" width="2" height="1.5"/>
    </g>

    <!-- Right skyline buildings -->
    <rect x="150" y="90"  width="12" height="30" rx="1" fill="url(#bldGrad)"/>
    <rect x="152" y="85"  width="8"  height="6"  rx="1" fill="url(#bldGrad)"/>
    <rect x="155" y="80"  width="2"  height="6"  rx="0.5" fill="url(#bldGrad)"/>
    <rect x="163" y="86"  width="9"  height="34" rx="1" fill="url(#bldGrad)"/>
    <rect x="164" y="80"  width="4"  height="7"  rx="1" fill="url(#bldGrad)"/>
    <rect x="165" y="76"  width="1.5" height="5" fill="rgba(100,160,255,0.6)"/>
    <rect x="173" y="94"  width="10" height="26" rx="1" fill="url(#bldGrad)"/>

    <!-- Right building windows -->
    <g fill="rgba(255,220,80,0.55)" filter="url(#winGlow)">
      <rect x="152" y="93"  width="2" height="1.5"/>
      <rect x="156" y="93"  width="2" height="1.5"/>
      <rect x="152" y="99"  width="2" height="1.5"/>
      <rect x="156" y="99"  width="2" height="1.5"/>
      <rect x="152" y="105" width="2" height="1.5"/>
      <rect x="165" y="90"  width="2" height="1.5"/>
      <rect x="169" y="90"  width="2" height="1.5"/>
      <rect x="165" y="96"  width="2" height="1.5"/>
      <rect x="175" y="97"  width="2" height="1.5"/>
      <rect x="175" y="103" width="2" height="1.5"/>
    </g>
    <g fill="rgba(100,180,255,0.45)">
      <rect x="158" y="105" width="2" height="1.5"/>
      <rect x="167" y="96"  width="2" height="1.5"/>
      <rect x="177" y="103" width="2" height="1.5"/>
    </g>
  </g>

  <!-- ═══ CENTRAL PARK CANOPY ═══ -->
  <g clip-path="url(#innerClip)" filter="url(#treeGlow)">
    <!-- Ground / meadow -->
    <ellipse cx="100" cy="147" rx="64" ry="9" fill="#0a4020" opacity="0.8"/>
    <ellipse cx="100" cy="145" rx="58" ry="6" fill="#0c5028" opacity="0.6"/>

    <!-- Back row trees (darker, smaller) -->
    <ellipse cx="60"  cy="118" rx="16" ry="20" fill="#0e5a25"/>
    <ellipse cx="85"  cy="112" rx="18" ry="22" fill="#0e5a25"/>
    <ellipse cx="115" cy="112" rx="18" ry="22" fill="#0e5a25"/>
    <ellipse cx="140" cy="118" rx="16" ry="20" fill="#0e5a25"/>

    <!-- Mid row trees -->
    <ellipse cx="50"  cy="128" rx="18" ry="22" fill="url(#treeGrad)"/>
    <ellipse cx="75"  cy="122" rx="20" ry="25" fill="url(#treeGrad)"/>
    <ellipse cx="100" cy="118" rx="24" ry="28" fill="url(#treeGrad)"/>
    <ellipse cx="125" cy="122" rx="20" ry="25" fill="url(#treeGrad)"/>
    <ellipse cx="150" cy="128" rx="18" ry="22" fill="url(#treeGrad)"/>

    <!-- Tree highlights (lighter tops) -->
    <ellipse cx="48"  cy="122" rx="10" ry="13" fill="url(#treeGrad2)" opacity="0.7"/>
    <ellipse cx="73"  cy="116" rx="11" ry="14" fill="url(#treeGrad2)" opacity="0.7"/>
    <ellipse cx="98"  cy="111" rx="14" ry="16" fill="url(#treeGrad2)" opacity="0.75"/>
    <ellipse cx="123" cy="116" rx="11" ry="14" fill="url(#treeGrad2)" opacity="0.7"/>
    <ellipse cx="148" cy="122" rx="10" ry="13" fill="url(#treeGrad2)" opacity="0.7"/>

    <!-- Tiny bright specular highlights -->
    <ellipse cx="97"  cy="108" rx="6"  ry="7"  fill="#34e87a" opacity="0.35"/>
    <ellipse cx="72"  cy="114" rx="5"  ry="6"  fill="#34e87a" opacity="0.25"/>
    <ellipse cx="124" cy="114" rx="5"  ry="6"  fill="#34e87a" opacity="0.25"/>

    <!-- Park path (subtle warm tone) -->
    <ellipse cx="100" cy="148" rx="28" ry="3" fill="rgba(180,140,80,0.2)"/>
  </g>

  <!-- ═══ PULSE / ECG LINE (runs across trees) ═══ -->
  <g clip-path="url(#innerClip)" filter="url(#pulseGlow)">
    <polyline
      points="18,118  35,118  40,118  45,104  50,132  56,108  61,118  72,118  78,118  84,97  90,138  97,112  103,118  112,118  118,104  124,132  130,108  136,118  148,118  155,118  165,118  182,118"
      stroke="url(#pulseGrad)"
      stroke-width="3"
      fill="none"
      stroke-linecap="round"
      stroke-linejoin="round"/>
    <!-- Second pass — thinner bright overlay -->
    <polyline
      points="18,118  35,118  40,118  45,104  50,132  56,108  61,118  72,118  78,118  84,97  90,138  97,112  103,118  112,118  118,104  124,132  130,108  136,118  148,118  155,118  165,118  182,118"
      stroke="white"
      stroke-width="1"
      fill="none"
      stroke-linecap="round"
      stroke-linejoin="round"
      opacity="0.45"/>
  </g>

  <!-- ═══ SUBTLE INNER RING GLOW ═══ -->
  <circle cx="100" cy="100" r="84" fill="none" stroke="url(#ringGrad)" stroke-width="1.5" opacity="0.4"/>
</svg>

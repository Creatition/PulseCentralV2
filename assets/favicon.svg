<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="fvRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#7b2fff"/>
      <stop offset="100%" stop-color="#ff2f7b"/>
    </linearGradient>
    <linearGradient id="fvPulse" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#7b2fff"/>
      <stop offset="100%" stop-color="#ff2f7b"/>
    </linearGradient>
    <linearGradient id="fvSky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#0d0a1f"/>
      <stop offset="100%" stop-color="#120c28"/>
    </linearGradient>
    <clipPath id="fvClip">
      <circle cx="32" cy="32" r="28"/>
    </clipPath>
  </defs>

  <!-- Outer gradient ring -->
  <circle cx="32" cy="32" r="32" fill="url(#fvRing)"/>
  <!-- Inner dark sky -->
  <circle cx="32" cy="32" r="28" fill="url(#fvSky)"/>

  <!-- City skyline silhouette (subtle, sides) -->
  <g fill="rgba(123,47,255,0.22)" clip-path="url(#fvClip)">
    <rect x="4"  y="32" width="4"  height="12" rx="1"/>
    <rect x="5"  y="26" width="2"  height="6"  rx="1"/>
    <rect x="9"  y="34" width="3"  height="10" rx="1"/>
  </g>
  <g fill="rgba(255,47,123,0.22)" clip-path="url(#fvClip)">
    <rect x="48" y="30" width="4"  height="14" rx="1"/>
    <rect x="49" y="24" width="2"  height="6"  rx="1"/>
    <rect x="53" y="34" width="3"  height="10" rx="1"/>
  </g>

  <!-- Trees (Central Park style) -->
  <ellipse cx="17" cy="34" rx="9"  ry="11" fill="#0f3d1e" clip-path="url(#fvClip)"/>
  <ellipse cx="32" cy="30" rx="11" ry="13" fill="#145229" clip-path="url(#fvClip)"/>
  <ellipse cx="47" cy="34" rx="9"  ry="11" fill="#0f3d1e" clip-path="url(#fvClip)"/>
  <!-- Tree highlights -->
  <ellipse cx="15" cy="31" rx="5"  ry="6"  fill="#1e7a3c" opacity="0.75" clip-path="url(#fvClip)"/>
  <ellipse cx="30" cy="27" rx="6"  ry="7"  fill="#1e7a3c" opacity="0.75" clip-path="url(#fvClip)"/>
  <ellipse cx="45" cy="31" rx="5"  ry="6"  fill="#1e7a3c" opacity="0.75" clip-path="url(#fvClip)"/>

  <!-- Ground path -->
  <ellipse cx="32" cy="46" rx="22" ry="3.5" fill="rgba(140,110,60,0.22)" clip-path="url(#fvClip)"/>

  <!-- Pulse / heartbeat line -->
  <polyline
    points="4,44 12,44 15,37 19,51 23,38 28,46 32,44 39,44 43,37 47,51 51,44 60,44"
    stroke="url(#fvPulse)" stroke-width="2.6"
    fill="none" stroke-linecap="round" stroke-linejoin="round"
    clip-path="url(#fvClip)"/>
</svg>
